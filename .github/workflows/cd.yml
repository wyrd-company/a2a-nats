name: CD

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Set package version from SemVer tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag $TAG is not a numeric SemVer release tag like 0.1.0"
            exit 1
          fi
          npm version --no-git-tag-version --allow-same-version "$TAG"
      - run: npm run verify
      - name: Publish to npmjs.org
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@wyrd-company'

      - name: Publish to GitHub Packages
        run: npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        run: |
          title="$(node -p "require('./package.json').name + '@' + require('./package.json').version")"
          gh release create "${GITHUB_REF_NAME}" --title "$title" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
